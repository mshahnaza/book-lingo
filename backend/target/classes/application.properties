# Application
spring.application.name=booklingo
server.port=8080

# Database (H2 for development)
spring.datasource.url=jdbc:h2:file:./data/booklingo
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret.key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.access.token.expiration=900000
jwt.refresh.token.expiration=604800000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.directory=./uploads
file.txt.lines.per.page=50

# Translation Configuration
# Options: 'libretranslate' (FREE) or 'google' (PAID)
translation.provider=libretranslate

# LibreTranslate API (FREE - Default)
# Public instance (may have rate limits): https://libretranslate.com
# Or self-host with Docker: docker run -ti --rm -p 5000:5000 libretranslate/libretranslate
libretranslate.api.url=https://libretranslate.com
libretranslate.api.key=

# Google Translate API (PAID - Optional)
# Get API key from: https://console.cloud.google.com/
# Enable Cloud Translation API and create credentials
google.translate.api.key=

# Logging
logging.level.org.example.booklingo=DEBUG
logging.level.org.springframework.security=DEBUG
